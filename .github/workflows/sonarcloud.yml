name: SonarCloud

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Make Maven wrapper executable
        run: chmod +x backend/mvnw

      - name: Build backend and generate coverage
        working-directory: backend
        run: ./mvnw -B verify -Djacoco.skip=false

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests and generate coverage
        working-directory: frontend
        run: |
          npm test -- --coverage --silent || true
          # ensure lcov exists for Sonar (some setups place it under coverage/lcov.info)
          if [ -f coverage/lcov.info ]; then
            echo "Found frontend coverage at coverage/lcov.info"
          else
            echo "No frontend lcov found; sonar frontend coverage will be skipped"
          fi

      - name: Validate SonarCloud configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          test -n "$SONAR_TOKEN" || { echo "Missing GitHub secret: SONAR_TOKEN"; exit 1; }
          test -n "$SONAR_ORGANIZATION" || { echo "Missing GitHub variable: SONAR_ORGANIZATION"; exit 1; }
          test -n "$SONAR_PROJECT_KEY" || { echo "Missing GitHub variable: SONAR_PROJECT_KEY"; exit 1; }

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.java.coveragePlugin=jacoco
            -Dsonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
