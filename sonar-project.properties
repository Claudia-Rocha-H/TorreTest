sonar.projectName=TorreTechTest
sonar.sourceEncoding=UTF-8

# Only analyze backend Java code
sonar.sources=backend/src/main/java
sonar.tests=backend/src/test/java

sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/coverage/**,**/public/**,**/*.config.js,**/*.config.mjs,**/*.config.ts,**/*.ico,**/tailwind.config.ts,**/postcss.config.mjs,**/next.config.ts,frontend/.vercel/**,frontend/vercel.json

# Use JaCoCo XML report for Java coverage
sonar.java.coveragePlugin=jacoco

# Exclude DTO/Response classes from duplication check (boilerplate code required by Jackson/Lombok)
sonar.cpd.exclude=**/*Response.java,**/*Request.java,**/PersonDetailsResponse.java
